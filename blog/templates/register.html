{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for sharing your Blog with Professionals </title>

    <link rel="icon" href="{% static 'images/logo.png' %}">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        html, body{
            width:100%;
            height:100%;
            overflow-x:hidden;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f3f6fb;
            position:relative;
            padding:20px;
        }

        body::before{
            content:"";
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            width:420px;
            height:420px;
            background:url("{% static 'images/logo.png' %}") no-repeat center;
            background-size:contain;
            opacity:0.04;
            z-index:0;
            pointer-events:none;
        }

        .register-container{
            width:100%;
            max-width:430px;
            background:white;
            padding:40px;
            border-radius:22px;
            box-shadow:0 12px 40px rgba(0,0,0,0.12);
            position:relative;
            z-index:1;
        }

        .auth-logo{
            width:95px;
            display:block;
            margin:0 auto 15px;
        }

        h2{
            text-align:center;
            color:#111827;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#6b7280;
            margin-bottom:25px;
            font-size:14px;
        }

        .message{
            background:#e0f2fe;
            color:#075985;
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
            text-align:center;
            font-size:14px;
        }

        form p{
            margin-bottom:16px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#374151;
        }

        input{
            width:100%;
            max-width:100%;
            padding:13px;
            border:1px solid #d1d5db;
            border-radius:10px;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#2563eb;
            box-shadow:0 0 8px rgba(37,99,235,0.2);
        }

        button{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
            margin-top:10px;
        }

        button:hover{
            background:#1d4ed8;
        }

        .login-link{
            margin-top:18px;
            text-align:center;
        }

        .login-btn{
            display:inline-block;
            margin-top:10px;
            padding:12px 20px;
            background:#111827;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#374151;
        }

        @media(max-width:480px){
            .register-container{
                padding:28px 22px;
            }

            body::before{
                width:300px;
                height:300px;
            }
        }
    </style>
</head>

<body>

    <div class="register-container">

        <img src="{% static 'images/logo.png' %}" class="auth-logo">

        <h2>Create Account</h2>

        <p class="subtitle">
            Register with email verification OTP
        </p>

        {% for message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Send OTP
            </button>
        </form>

        <div class="login-link">
            <p>Already have an account?</p>

            <a href="{% url 'login' %}" class="login-btn">
                Go to Login
            </a>
        </div>

    </div>

</body>

</html>
